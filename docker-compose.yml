version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: food_admin
      POSTGRES_PASSWORD: "foodadmin@123"
      POSTGRES_DB: food_ordering_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "food_admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://food_admin:foodadmin%40123@db:5432/food_ordering_db"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  postgres_data:
