version: '3.9'

services:
  db:
    image: postgres:15
    container_name: food_ordering_db
    environment:
      POSTGRES_USER: food_admin
      POSTGRES_PASSWORD: "foodadmin@123"
      POSTGRES_DB: food_ordering_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "food_admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food_ordering_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://food_admin:foodadmin%40123@db:5432/food_ordering_db"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8000"
    container_name: food_ordering_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
