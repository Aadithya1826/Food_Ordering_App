server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy API requests to backend — avoids CORS entirely
    # Using the backend's public hostname so it works both in Docker and on the host
    location /api/ {
        proxy_pass http://dev-api.dataudipi.com/api/;
        proxy_set_header Host dev-api.dataudipi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy static images from backend
    # Fixes images returned by API as "http://localhost:8000/static/..." — rewrite them via proxy
    location /static/ {
        proxy_pass http://dev-api.dataudipi.com/static/;
        proxy_set_header Host dev-api.dataudipi.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Serve static files, fallback to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
